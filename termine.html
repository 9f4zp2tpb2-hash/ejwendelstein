<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Termine — Evangelische Jugend Wendelstein</title>
<link rel="icon" href="images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Caveat:wght@600;700&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header" id="site-header-mount"></header>

<main>
  <section class="page-banner bg-paper">
    <div class="container">
      <p class="eyebrow" id="eyebrow"></p>
      <h1><span class="swoosh" id="title"></span></h1>
      <p class="lead" id="lead"></p>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="grid grid-2" id="events" style="max-width:900px;margin:0 auto;"></div>
    </div>
  </section>
</main>

<footer class="site-footer" id="site-footer-mount"></footer>

<script src="js/main.js"></script>
<script>
ejwInit("termine.html", "", (content) => {
  const t = content.termine;
  document.getElementById("eyebrow").textContent = t.eyebrow;
  document.getElementById("title").textContent = t.title;
  document.getElementById("lead").textContent = t.lead;
  document.getElementById("events").innerHTML = t.events.map(e => `
    <div class="event-card">
      <div class="event-date">
        <div class="day">${e.day}</div>
        <div class="month">${e.month}</div>
      </div>
      <div class="event-body">
        <h3>${e.title}</h3>
        <div class="event-meta">${e.meta}</div>
        <p>${e.text}</p>
      </div>
    </div>
  `).join("");
});
</script>
</body>
</html>
